<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>DigiCanvas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body class="mobile-mode">

<!-- ══ TELA DE CONEXÃO ══ -->
<div id="screen-connect" class="screen active">
  <div class="mobile-bg"><div class="glow-orb orb-mobile"></div></div>
  <div class="connect-content">
    <div class="logo-mark small"><svg viewBox="0 0 60 60" fill="none"><rect x="4" y="4" width="52" height="52" rx="8" stroke="var(--accent)" stroke-width="2"/><path d="M16 44 L28 20 L34 32 L40 24 L46 44" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="46" cy="16" r="5" fill="var(--accent2)" opacity="0.8"/></svg></div>
    <h1>DigiCanvas</h1>
    <p class="subtitle">Mesa digitalizadora</p>
    <div class="code-input-section">
      <label class="input-label">Código da sessão (6 dígitos)</label>
      <div class="code-inputs">
        <input type="text" maxlength="1" class="code-char" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="text" maxlength="1" class="code-char" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="text" maxlength="1" class="code-char" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <span class="code-sep">–</span>
        <input type="text" maxlength="1" class="code-char" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="text" maxlength="1" class="code-char" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="text" maxlength="1" class="code-char" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
      </div>
      <button id="btn-connect" class="btn-primary full" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Conectar
      </button>
      <div id="connect-status" class="connect-status"><span id="connect-msg"></span></div>
    </div>
    <div class="connect-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Abra <strong>index.html</strong> no PC → <strong>Gerar Código</strong>
    </div>
  </div>
</div>

<!-- ══ TELA DE DESENHO ══ -->
<div id="screen-draw" class="screen">

  <!-- HUD -->
  <div id="mobile-hud">
    <div class="hud-left">
      <div id="mobile-status-dot" class="status-dot connected"></div>
      <span id="mobile-status-text" class="hud-status">Conectado</span>
    </div>
    <div class="hud-center"><span id="mobile-mode-label" class="hud-mode">Desenho</span></div>
    <div class="hud-right">
      <button id="btn-mobile-menu" class="icon-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  </div>

  <!-- CAMADAS DE CANVAS (z-index crescente) -->
  <!-- Bug #11: cada camada é independente; eraser não toca nas inferiores -->
  <canvas id="bg-canvas"          style="position:absolute;z-index:1;pointer-events:none;"></canvas>
  <canvas id="thumb-canvas"       style="position:absolute;z-index:2;pointer-events:none;"></canvas>
  <canvas id="remote-canvas-mob"  style="position:absolute;z-index:3;pointer-events:none;"></canvas><!-- Bug #10 -->
  <canvas id="grid-canvas-mob"    style="position:absolute;z-index:4;pointer-events:none;"></canvas>
  <canvas id="mobile-canvas"      style="position:absolute;z-index:5;touch-action:none;"></canvas>

  <!-- TOOLBAR INFERIOR -->
  <div id="mobile-toolbar">
    <!-- Linha 1: ferramentas -->
    <div class="toolbar-row tools-row">
      <button class="mob-tool active" data-tool="pen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
        <span>Caneta</span>
      </button>
      <button class="mob-tool" data-tool="marker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/><path d="M20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        <span>Marcador</span>
      </button>
      <button class="mob-tool" data-tool="highlighter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3L5 21"/><path d="M15 3l4 18"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
        <span>Marca-texto</span>
      </button>
      <button class="mob-tool" data-tool="eraser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-3 4"/><path d="M7 20l4-4"/></svg>
        <span>Borracha</span>
      </button>
      <div class="tool-divider"></div>
      <button class="mob-tool" data-tool="pan" id="btn-pan-mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        <span>Navegar</span>
      </button>
      <button class="mob-tool" id="btn-resize-mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span>Resize</span>
      </button>
    </div>

    <!-- Linha 2: cores + espessura slider + ações -->
    <div class="toolbar-row options-row">
      <div class="quick-colors">
        <button class="quick-color active" data-color="#e63946" style="--c:#e63946"></button>
        <button class="quick-color" data-color="#4cc9f0"  style="--c:#4cc9f0"></button>
        <button class="quick-color" data-color="#2dc653"  style="--c:#2dc653"></button>
        <button class="quick-color" data-color="#f7c559"  style="--c:#f7c559"></button>
        <button class="quick-color" data-color="#ffffff"  style="--c:#ffffff"></button>
        <button class="quick-color" data-color="#000000"  style="--c:#000000"></button>
        <input type="color" id="mob-color" value="#e63946" />
      </div>
      <div class="options-divider"></div>
      <!-- Slider de espessura (#4) -->
      <div class="size-slider-mob">
        <div class="size-preview-wrap"><div id="size-preview-dot" class="size-preview-dot"></div></div>
        <input type="range" id="size-slider" min="1" max="100" value="3" />
        <span id="size-slider-label" class="size-slider-num">3</span>
      </div>
      <div class="options-divider"></div>
      <button id="btn-mob-undo"  class="action-btn" title="Desfazer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg></button>
      <button id="btn-mob-clear" class="action-btn" title="Limpar meus traços"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
    </div>
  </div>

  <!-- MENU LATERAL -->
  <div id="mobile-menu" class="side-menu hidden">
    <div class="menu-header">
      <span>Configurações</span>
      <button id="btn-close-menu" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="menu-body">
      <div class="menu-group">
        <div class="menu-group-title">Desenho</div>
        <label class="toggle-row"><span>Haptic</span><input type="checkbox" id="toggle-haptic" checked /><span class="toggle-knob"></span></label>
        <label class="toggle-row"><span>Palm reject</span><input type="checkbox" id="toggle-palm" checked /><span class="toggle-knob"></span></label>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">Viewport</div>
        <label class="toggle-row"><span>🔒 Travar zoom</span><input type="checkbox" id="toggle-zoom-lock" /><span class="toggle-knob"></span></label>
        <label class="toggle-row"><span>Grade</span><input type="checkbox" id="toggle-grid-mob" /><span class="toggle-knob"></span></label>
        <div class="menu-field">
          <label>Sensibilidade pan</label>
          <input type="range" id="pan-sensitivity" min="0.3" max="3" step="0.1" value="1" />
        </div>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">Fundo do canvas</div>
        <select id="bg-select" class="menu-select">
          <option value="pdf">PDF (miniatura)</option>
          <option value="dark">Escuro</option>
          <option value="light">Claro</option>
          <option value="amoled">AMOLED (preto)</option>
          <option value="checkerboard">Xadrez (transparência)</option>
        </select>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">Tema</div>
        <div class="theme-grid-mob">
          <button data-theme-btn="dark"   class="theme-option-mob active">Escuro</button>
          <button data-theme-btn="light"  class="theme-option-mob">Claro</button>
          <button data-theme-btn="amoled" class="theme-option-mob">AMOLED</button>
        </div>
      </div>
      <button id="btn-mob-disconnect" class="btn-danger full mt16">Desconectar</button>
    </div>
  </div>

</div><!-- /screen-draw -->

<script type="module" src="js/store.js"></script>
<script type="module" src="js/state.js"></script>
<script type="module" src="js/viewport.js"></script>
<script type="module" src="js/renderer.js"></script>
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/signaling.js"></script>
<script type="module" src="js/webrtc.js"></script>
<script type="module" src="js/toast.js"></script>
<script type="module" src="js/mobile.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
}
</script>
</body>
</html>
